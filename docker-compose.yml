version: '3.8'

services:
  # ---------------- PHP Application ----------------
  app:
    build: .
    container_name: electroshop_app
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: electroshop
      DB_USER: electro_user
      DB_PASS: electro_pass
    depends_on:
      - db
    volumes:
      - ./:/var/www/html
    restart: unless-stopped

  # ---------------- MySQL Database ----------------
  db:
    image: mysql:8.0
    container_name: electroshop_db
    environment:
      MYSQL_DATABASE: electroshop
      MYSQL_USER: electro_user
      MYSQL_PASSWORD: electro_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  # ---------------- phpMyAdmin (optional, helpful for defense/demo) ----------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: electroshop_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: electro_user
      PMA_PASSWORD: electro_pass
    ports:
      - "8081:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
